name: 'retail_lakehouse'
version: '1.0.0'
config-version: 2
profile: 'retail_lakehouse'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  retail_lakehouse:
    # Lớp đệm staging quét trực tiếp file Parquet từ tầng Silver
    staging:
      +materialized: view
    
    # Lớp Gold chuẩn chỉ chứa Fact và Dimensions phục vụ phân tích
    marts:
      +materialized: table
